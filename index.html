<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Müller Pro - Entrenador Alemán</title>
    <!-- Tailwind CSS (solo clases, sin producción) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React y ReactDOM (versiones development para evitar errores de producción) -->
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <!-- Babel standalone -->
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
    <!-- Lucide icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { margin: 0; background-color: #0f172a; overflow: hidden; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .lucide-wrapper { display: contents; }
        .handwriting-canvas { touch-action: none; background: white; border-radius: 1rem; box-shadow: 0 0 0 2px #3b82f6; width: 100%; height: auto; max-height: 300px; cursor: crosshair; }
        @media (max-width: 640px) { .handwriting-canvas { max-height: 200px; } }
        /* Colores suaves para toda la app */
        .soft-bg { background-color: #0f172a; } /* slate-900 */
        .soft-card { background-color: #1e293b; border-color: #334155; }
        .soft-text { color: #e2e8f0; }
        .soft-button { background-color: #334155; color: #f1f5f9; }
        .soft-button:hover { background-color: #475569; }
        .accent-blue { background-color: #2563eb; }
        .accent-blue:hover { background-color: #3b82f6; }
        .accent-amber { background-color: #b45309; }
        .accent-amber:hover { background-color: #d97706; }
    </style>
</head>
<body>
<div id="root"><div class="text-white p-4 text-center">Cargando aplicación...</div></div>

<script type="text/babel">
// ==================== IMPORTAR REACT (para evitar errores de hooks) ====================
const React = window.React;
const ReactDOM = window.ReactDOM;
const { useState, useEffect, useRef, useCallback } = React;

// ==================== COMPONENTE ICON ====================
const Icon = ({ name, className }) => {
    useEffect(() => { if(window.lucide) window.lucide.createIcons(); }, []);
    return <span className="lucide-wrapper" dangerouslySetInnerHTML={{ __html: `<i data-lucide="${name}" class="${className || ''}"></i>` }} />;
};

// ==================== DATOS POR DEFECTO ====================
const DEFAULT_GUION = [
    { speaker: 'Lukas', text: 'Hallo Elena! Heute ist ein großer Tag.', translation: '¡Hola Elena! Hoy es un gran día.', vocab: [{ de: 'der Tag', es: 'el día', diff: 0 }] },
    { speaker: 'Lukas', text: 'Ich bin nervös, weil wir Bilder ausstellen.', translation: 'Estoy nervioso porque exponemos cuadros.', vocab: [{ de: 'ausstellen', es: 'exponer', diff: 0 }] },
    { speaker: 'Elena', text: 'Keine Sorge. Du bist ein toller Künstler.', translation: 'No te preocupes. Eres un gran artista.', isRedemittel: true, vocab: [{ de: 'der Künstler', es: 'el artista', diff: 0 }] },
    { speaker: 'Elena', text: 'Du wirst heute viel Anerkennung bekommen.', translation: 'Hoy recibirás mucho reconocimiento.', vocab: [{ de: 'die Anerkennung', es: 'el reconocimiento', diff: 1 }, { de: 'bekommen', es: 'recibir', diff: 0 }] },
    { speaker: 'Lukas', text: 'Schau dir dieses Gemälde hier an.', translation: 'Mira este cuadro de aquí.', vocab: [{ de: 'das Gemälde', es: 'el cuadro', diff: 0 }] },
    { speaker: 'Lukas', text: 'Es ist im Sommer entstanden.', translation: 'Surgió (fue creado) en verano.', vocab: [{ de: 'entstehen', es: 'surgir / crearse', diff: 1 }] },
    { speaker: 'Lukas', text: 'Das ist super! Es gefällt mir sehr.', translation: '¡Eso es genial! Me gusta mucho.', isRedemittel: true, vocab: [{ de: 'super', es: 'genial', diff: 0 }] },
    { speaker: 'Elena', text: 'Man sieht den Einfluss der Natur.', translation: 'Se ve la influencia de la naturaleza.', vocab: [{ de: 'der Einfluss', es: 'la influencia', diff: 1 }] },
    { speaker: 'Herr Weber', text: 'Guten Tag. Wer ist der Maler?', translation: 'Buenas tardes. ¿Quién es el pintor?', vocab: [{ de: 'der Maler', es: 'el pintor', diff: 0 }] },
    { speaker: 'Herr Weber', text: 'Ich bin 1945 geboren worden.', translation: 'Yo nací en 1945.', vocab: [{ de: 'geboren werden', es: 'nacer', diff: 1 }] }
];

const TEMPUS_DICT = {
    "ausstellen": "Prät: stellte aus | Perf: hat ausgestellt",
    "bekommen": "Prät: bekam | Perf: hat bekommen",
    "entstehen": "Prät: entstand | Perf: ist entstanden",
    "sehen": "Prät: sah | Perf: hat gesehen"
};

const GRAMMAR_PATTERNS = [
    { regex: /(interessier[en|t|e]+\s+.*für)/gi, tooltip: "sich interessieren für + Akk", base: "sich interessieren für" },
    { regex: /(kämpfen\s+gegen)/gi, tooltip: "kämpfen gegen + Akk", base: "kämpfen gegen" }
];
const CONN_LIST = ["weil", "dass", "obwohl", "wenn", "als", "deshalb", "trotzdem", "und", "aber", "oder"];
const PREP_DAT = ["aus", "bei", "mit", "nach", "seit", "von", "zu"];
const PREP_AKK = ["durch", "für", "gegen", "ohne", "um"];
const PREP_WECHSEL = ["in", "an", "auf", "neben", "hinter", "über", "unter", "vor", "zwischen"];

// ==================== COMPONENTE PRINCIPAL ====================
function App() {
    // Estados principales
    const [activeTab, setActiveTab] = useState('historia');
    const [guionData, setGuionData] = useState(DEFAULT_GUION);
    const [activeScriptTitle, setActiveScriptTitle] = useState("Lektion 17: Kunst");
    const [sceneIndex, setSceneIndex] = useState(0);
    const [mode, setMode] = useState('dialogue');
    const [isPlaying, setIsPlaying] = useState(false);
    const [voicesLoaded, setVoicesLoaded] = useState(false);
    const [playbackRate, setPlaybackRate] = useState(1.0);
    const [blindMode, setBlindMode] = useState(false);
    const [lueckentextMode, setLueckentextMode] = useState(false);
    const [declinaMode, setDeclinaMode] = useState(false);
    const [tempusMode, setTempusMode] = useState(false);
    const [artikelSniperMode, setArtikelSniperMode] = useState(false);
    const [fluesternMode, setFluesternMode] = useState(false);
    const [roleplayChar, setRoleplayChar] = useState('none');
    const [podcastMode, setPodcastMode] = useState(false);
    const [showCurrentTranslation, setShowCurrentTranslation] = useState(false);
    const [diktatMode, setDiktatMode] = useState(false);
    const [diktatInput, setDiktatInput] = useState("");
    const [showDiktatResult, setShowDiktatResult] = useState(false);
    const [savedScripts, setSavedScripts] = useState([]);
    const [customVocabLessons, setCustomVocabLessons] = useState([]);
    const [vocabTitleInput, setVocabTitleInput] = useState("");
    const [vocabTextInput, setVocabTextInput] = useState("");
    const [userStats, setUserStats] = useState({
        username: "Estudiante", isPremium: true, xp: 0, streakDays: 1,
        lastPlayedDate: new Date().toISOString().split('T')[0],
        coins: 150, hearts: 5, diktatAttempts: 0, diktatCorrect: 0,
        difficultVocab: [], normalVocab: [], difficultGrammar: [],
        failedDiktatScenes: [], activityLog: [40, 60, 45, 80, 55, 90, 75]
    });
    const [vocabReviewIndex, setVocabReviewIndex] = useState(0);
    const [showVocabTranslation, setShowVocabTranslation] = useState(false);
    const [currentVocabList, setCurrentVocabList] = useState([]);
    const [practiceActive, setPracticeActive] = useState(null);
    const [practiceIndex, setPracticeIndex] = useState(0);
    const [practiceShowTrans, setPracticeShowTrans] = useState(false);
    const [newScriptTitle, setNewScriptTitle] = useState("");
    const [scriptInput, setScriptInput] = useState(`Lukas: Hallo Elena! (¡Hola Elena!) [der Tag - el día]`);
    const [showLoginModal, setShowLoginModal] = useState(false);
    const [tempUsername, setTempUsername] = useState("");
    const [showTutor, setShowTutor] = useState(false);
    const [tutorMessage, setTutorMessage] = useState("");
    const [showDeathModal, setShowDeathModal] = useState(false);
    const [selectedLessonIds, setSelectedLessonIds] = useState([]);
    const [handwritingMode, setHandwritingMode] = useState(false);
    const [noiseEnabled, setNoiseEnabled] = useState(false);
    const [noiseSource, setNoiseSource] = useState(null);
    const [noiseCtx, setNoiseCtx] = useState(null);
    
    const isPlayingRef = useRef(false);
    const timeoutRef = useRef(null);
    const recognitionRef = useRef(null);

    // Cargar datos guardados
    useEffect(() => {
        const saved = localStorage.getItem('mullerStats');
        if(saved) setUserStats(JSON.parse(saved));
        else setShowLoginModal(true);
        const scripts = localStorage.getItem('mullerScripts');
        if(scripts) setSavedScripts(JSON.parse(scripts));
        const vocab = localStorage.getItem('mullerCustomVocab');
        if(vocab) setCustomVocabLessons(JSON.parse(vocab));
        const handleVoices = () => setVoicesLoaded(true);
        window.speechSynthesis.addEventListener('voiceschanged', handleVoices);
        if(window.speechSynthesis.getVoices().length) setVoicesLoaded(true);
        return () => window.speechSynthesis.removeEventListener('voiceschanged', handleVoices);
    }, []);

    useEffect(() => { isPlayingRef.current = isPlaying; }, [isPlaying]);

    // Funciones de audio
    const stopAudio = () => {
        window.speechSynthesis.cancel();
        if(timeoutRef.current) clearTimeout(timeoutRef.current);
        setIsPlaying(false);
        if(noiseSource) {
            try { noiseSource.stop(); noiseCtx?.close(); } catch(e) {}
            setNoiseSource(null);
            setNoiseCtx(null);
        }
    };

    const playSceneAudio = (text, speaker) => {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'de-DE';
        const voices = window.speechSynthesis.getVoices();
        const getVoice = (gender) => voices.find(v => v.lang.startsWith('de') && (gender==='female' ? /female|Katja/i.test(v.name) : /male|Stefan/i.test(v.name))) || voices[0];
        if(speaker === 'Lukas') utterance.voice = getVoice('male');
        else if(speaker === 'Elena') utterance.voice = getVoice('female');
        else if(speaker.includes('Weber')) utterance.voice = getVoice('male');
        utterance.rate = (speaker.includes('Weber')?0.9:1.0) * playbackRate;
        if(fluesternMode) utterance.volume = 0.3;
        else utterance.volume = 1.0;

        // Ruido de fondo
        if(noiseEnabled && !noiseSource) {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                const ctx = new AudioContext();
                const gain = ctx.createGain();
                gain.gain.value = 0.1;
                const bufferSize = 4096;
                const noiseBuffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                const output = noiseBuffer.getChannelData(0);
                for(let i=0; i<bufferSize; i++) output[i] = Math.random() * 2 - 1;
                const src = ctx.createBufferSource();
                src.buffer = noiseBuffer;
                src.loop = true;
                src.connect(gain);
                gain.connect(ctx.destination);
                src.start();
                setNoiseSource(src);
                setNoiseCtx(ctx);
            } catch(e) { console.warn("Ruido no soportado"); }
        }

        utterance.onend = () => {
            if(noiseSource) { noiseSource.stop(); noiseCtx?.close(); setNoiseSource(null); setNoiseCtx(null); }
            if(isPlayingRef.current) {
                if(diktatMode) { setIsPlaying(false); return; }
                timeoutRef.current = setTimeout(() => proceedToNextStage(), 1200);
            }
        };
        window.speechSynthesis.speak(utterance);
        return utterance;
    };

    const getActualSceneIndex = () => sceneIndex;
    const proceedToNextStage = () => {
        if(sceneIndex < guionData.length - 1) {
            setSceneIndex(s => s+1);
            setMode('dialogue');
            resetModes();
        } else {
            stopAudio();
            alert("¡Historia completada!");
        }
    };
    const resetModes = () => {
        setDiktatInput("");
        setShowDiktatResult(false);
        setShowCurrentTranslation(false);
    };
    const handleNext = () => { stopAudio(); proceedToNextStage(); };
    const handlePrev = () => { stopAudio(); if(sceneIndex > 0) { setSceneIndex(s=>s-1); resetModes(); } };
    const togglePlay = () => {
        if(userStats.hearts <= 0) setShowDeathModal(true);
        else if(isPlaying) stopAudio();
        else setIsPlaying(true);
    };

    // Reproducción automática cuando isPlaying cambia
    useEffect(() => {
        if(!isPlaying || !voicesLoaded || mode !== 'dialogue' || activeTab !== 'historia') return;
        const current = guionData[getActualSceneIndex()];
        if(!current) return;
        const utterance = playSceneAudio(current.text, current.speaker);
        return () => { window.speechSynthesis.cancel(); if(timeoutRef.current) clearTimeout(timeoutRef.current); };
    }, [sceneIndex, isPlaying, voicesLoaded, mode, activeTab, playbackRate, fluesternMode, noiseEnabled, diktatMode]);

    // Guardar vocabulario personalizado
    const handleSaveCustomVocab = () => {
        if(!vocabTitleInput.trim()) { alert("Título requerido"); return; }
        if(!vocabTextInput.trim()) { alert("Pega vocabulario"); return; }
        const lines = vocabTextInput.split(/\r?\n/);
        const parsed = [];
        const clean = (s) => s.replace(/[\u{1F000}-\u{1F9FF}]|[\u{2600}-\u{26FF}]|[\u{2700}-\u{27BF}]|[🔵🔴🟢⚡🏛️🗳️✍️🌀]/gu,'').replace(/^\d+[.\-):\]]*\s*/, '').trim();
        lines.forEach(line => {
            let l = line.replace(/^[🗳️🏛️⚡✍️🌀]*/, '').trim();
            let isDiff = false;
            if(l.startsWith('1')) { isDiff = true; l = l.replace(/^1[.\-):\]]*\s*/, ''); }
            l = l.replace(/^[-*•+>]\s*/, '');
            let de = '', es = '';
            const sep = l.match(/(\s+-\s+|\s+=\s+|\t|\s{2,})/);
            if(sep) {
                const idx = l.indexOf(sep[0]);
                de = clean(l.substring(0, idx));
                es = clean(l.substring(idx+sep[0].length));
            } else {
                const parts = l.split(/\s+/);
                let split = 1;
                if(parts.length>2 && /^(der|die|das|sich)$/i.test(parts[0])) split = 2;
                de = clean(parts.slice(0,split).join(' '));
                es = clean(parts.slice(split).join(' '));
                if(!es) es = "???";
            }
            if(de) parsed.push({ de, es, diff: isDiff?1:0 });
        });
        if(parsed.length) {
            const newLesson = { id: Date.now()+'-'+Math.random(), title: vocabTitleInput, words: parsed };
            const updated = [...customVocabLessons, newLesson];
            setCustomVocabLessons(updated);
            localStorage.setItem('mullerCustomVocab', JSON.stringify(updated));
            setVocabTitleInput(""); setVocabTextInput("");
            alert(`Guardado: ${parsed.length} palabras`);
        } else alert("No se pudo parsear el vocabulario.");
    };

    const handleSaveScript = () => {
        if(!newScriptTitle.trim()) { alert("Título"); return; }
        try {
            const lines = scriptInput.split('\n');
            const newGuion = [];
            lines.forEach(line => {
                if(!line.trim()) return;
                const match = line.match(/^([\w\s]+):/);
                if(!match) return;
                const speaker = match[1].trim();
                let rest = line.substring(match[0].length).trim();
                let vocab = [];
                const vbMatch = rest.match(/\[(.*?)\]$/);
                if(vbMatch) {
                    rest = rest.replace(/\[(.*?)\]$/, '').trim();
                    vbMatch[1].split(',').forEach(pair => {
                        const parts = pair.split('-');
                        if(parts.length>=2) vocab.push({ de: parts[0].trim(), es: parts[1].trim(), diff:1 });
                    });
                }
                let translation = "Traducción no proporcionada";
                const trMatch = rest.match(/\((.*?)\)$/);
                if(trMatch) { translation=trMatch[1].trim(); rest=rest.replace(/\((.*?)\)$/,'').trim(); }
                newGuion.push({ speaker, text: rest, translation, vocab });
            });
            if(!newGuion.length) throw new Error();
            const scriptObj = { id: Date.now(), title: newScriptTitle, data: JSON.stringify(newGuion) };
            const updated = [...savedScripts, scriptObj];
            setSavedScripts(updated);
            localStorage.setItem('mullerScripts', JSON.stringify(updated));
            setGuionData(newGuion); setActiveScriptTitle(newScriptTitle); setSceneIndex(0); setMode('dialogue'); stopAudio();
            setNewScriptTitle(""); setActiveTab('historia');
        } catch(e) { alert("Formato incorrecto."); }
    };

    const loadSavedScript = (script) => {
        setGuionData(JSON.parse(script.data)); setActiveScriptTitle(script.title); setSceneIndex(0); setMode('dialogue'); stopAudio(); setActiveTab('historia');
    };

    const playVocabAudio = () => {
        if(!currentVocabList.length) return;
        window.speechSynthesis.cancel();
        const w = currentVocabList[vocabReviewIndex];
        const cleanDe = w.de.replace(/^[0-9]+[.\-):\]]*\s*/g,'').trim();
        const cleanEs = w.es.trim();
        const utterDe = new SpeechSynthesisUtterance(cleanDe);
        utterDe.lang='de-DE'; utterDe.rate=0.85;
        utterDe.onend = () => { setTimeout(() => { setShowVocabTranslation(true); const utterEs = new SpeechSynthesisUtterance(cleanEs); utterEs.lang='es-ES'; window.speechSynthesis.speak(utterEs); }, 500); };
        window.speechSynthesis.speak(utterDe);
    };

    const handleVocabDifficulty = (level) => {
        const w = currentVocabList[vocabReviewIndex];
        let diff = [...userStats.difficultVocab], norm = [...userStats.normalVocab];
        if(level === 'hard') { if(!diff.some(d=>d.de===w.de)) diff.push(w); }
        else if(level === 'normal') { if(!norm.some(n=>n.de===w.de)) norm.push(w); }
        setUserStats({...userStats, difficultVocab: diff, normalVocab: norm});
        localStorage.setItem('mullerStats', JSON.stringify({...userStats, difficultVocab: diff, normalVocab: norm}));
        if(vocabReviewIndex < currentVocabList.length-1) { setVocabReviewIndex(v=>v+1); setShowVocabTranslation(false); }
        else { alert("¡Lista completada!"); setActiveTab('guiones'); }
    };

    const exportAllData = () => {
        const data = { userStats, savedScripts, customVocabLessons };
        const blob = new Blob([JSON.stringify(data)], {type:'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `muller_backup_${new Date().toISOString().slice(0,19)}.json`;
        a.click();
        URL.revokeObjectURL(a.href);
    };
    const importAllData = (file) => {
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const data = JSON.parse(e.target.result);
                if(data.userStats) { localStorage.setItem('mullerStats', JSON.stringify(data.userStats)); setUserStats(data.userStats); }
                if(data.savedScripts) { localStorage.setItem('mullerScripts', JSON.stringify(data.savedScripts)); setSavedScripts(data.savedScripts); }
                if(data.customVocabLessons) { localStorage.setItem('mullerCustomVocab', JSON.stringify(data.customVocabLessons)); setCustomVocabLessons(data.customVocabLessons); }
                alert("Importado. Recarga.");
                window.location.reload();
            } catch(err) { alert("Archivo inválido"); }
        };
        reader.readAsText(file);
    };

    const HandwritingPad = ({ onClose, onSave }) => {
        const canvasRef = useRef(null);
        const drawingRef = useRef(false);
        useEffect(() => {
            const canvas = canvasRef.current;
            if(!canvas) return;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = 'white';
            ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.strokeStyle = '#1e293b';
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';
            const draw = (e) => {
                if(!drawingRef.current) return;
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                let x, y;
                if(e.touches) { x = (e.touches[0].clientX - rect.left)*scaleX; y = (e.touches[0].clientY - rect.top)*scaleY; }
                else { x = (e.clientX - rect.left)*scaleX; y = (e.clientY - rect.top)*scaleY; }
                ctx.lineTo(x, y);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(x, y);
            };
            const start = (e) => {
                drawingRef.current = true;
                ctx.beginPath();
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                let x, y;
                if(e.touches) { x = (e.touches[0].clientX - rect.left)*scaleX; y = (e.touches[0].clientY - rect.top)*scaleY; }
                else { x = (e.clientX - rect.left)*scaleX; y = (e.clientY - rect.top)*scaleY; }
                ctx.moveTo(x, y);
                e.preventDefault();
            };
            const end = () => { drawingRef.current = false; ctx.beginPath(); };
            canvas.addEventListener('pointerdown', start);
            canvas.addEventListener('pointermove', draw);
            canvas.addEventListener('pointerup', end);
            canvas.addEventListener('touchstart', start);
            canvas.addEventListener('touchmove', draw);
            canvas.addEventListener('touchend', end);
            return () => {
                canvas.removeEventListener('pointerdown', start);
                canvas.removeEventListener('pointermove', draw);
                canvas.removeEventListener('pointerup', end);
            };
        }, []);
        const clearCanvas = () => {
            const canvas = canvasRef.current;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = 'white';
            ctx.fillRect(0,0,canvas.width,canvas.height);
        };
        return (
            <div className="fixed inset-0 bg-black/90 flex items-center justify-center z-50 p-4">
                <div className="bg-slate-800 rounded-2xl p-4 max-w-2xl w-full">
                    <h3 className="text-white font-bold mb-2">✍️ Escribe a mano</h3>
                    <canvas ref={canvasRef} width={600} height={300} className="handwriting-canvas"></canvas>
                    <div className="flex gap-3 mt-4">
                        <button onClick={clearCanvas} className="bg-red-700 px-4 py-2 rounded-lg">Borrar</button>
                        <button onClick={() => { onSave(canvasRef.current.toDataURL()); onClose(); }} className="bg-green-700 px-4 py-2 rounded-lg">Usar dibujo</button>
                        <button onClick={onClose} className="bg-gray-600 px-4 py-2 rounded-lg">Cancelar</button>
                    </div>
                </div>
            </div>
        );
    };

    const [showHandwriting, setShowHandwriting] = useState(false);

    const renderHighlightedText = (text, vocabList) => {
        let html = text;
        if(artikelSniperMode) html = html.replace(/\b(der|die|das|den|dem|des)\b/gi, '<span class="bg-red-800/40 text-red-200 border-b border-red-500/60 px-1 rounded">[???]</span>');
        if(declinaMode) html = html.replace(/\b(d|ein|kein|mein|dein|sein|ihr|unser|euer)(er|en|em|es|e|as|ie)\b/gi, '$1<span class="text-pink-300 bg-pink-800/30 border-b border-pink-500/60 px-1 rounded">[ _ ]</span>');
        if(vocabList?.length) {
            const sorted = [...vocabList].sort((a,b)=>b.de.length - a.de.length);
            sorted.forEach(v => {
                const search = v.de.replace(/^(der|die|das|sich)\s/i,'').trim().replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
                const regex = new RegExp(`(?![^<]*>)(^|[^a-zäöüßA-ZÄÖÜẞ])(${search})([^a-zäöüßA-ZÄÖÜẞ]|$)`, 'gi');
                if(lueckentextMode) html = html.replace(regex, `$1<span class="bg-gray-800 text-transparent border-b border-yellow-500/70 px-2 mx-0.5 select-none">[???]</span>$3`);
                else html = html.replace(regex, `$1<span class="bg-amber-500/20 text-amber-100 border-b border-amber-400/60 px-1 rounded-sm" title="${v.es}">$2</span>$3`);
            });
        }
        if(tempusMode) {
            Object.keys(TEMPUS_DICT).forEach(v => {
                const re = new RegExp(`\\b(${v})\\b`,'gi');
                html = html.replace(re, `$1 <span class="text-blue-200 text-[10px] bg-blue-800/50 border border-blue-500/50 px-1 rounded">(${TEMPUS_DICT[v]})</span>`);
            });
        }
        const connRe = new RegExp(`\\b(${CONN_LIST.join('|')})\\b`,'gi');
        html = html.replace(connRe, `<span class="text-purple-300 underline decoration-purple-500/70">$1</span>`);
        const datRe = new RegExp(`\\b(${PREP_DAT.join('|')})\\b`,'gi');
        html = html.replace(datRe, `<span class="text-blue-300 underline decoration-blue-500/70">$1</span>`);
        const akkRe = new RegExp(`\\b(${PREP_AKK.join('|')})\\b`,'gi');
        html = html.replace(akkRe, `<span class="text-red-300 underline decoration-red-500/70">$1</span>`);
        const wechRe = new RegExp(`\\b(${PREP_WECHSEL.join('|')})\\b`,'gi');
        html = html.replace(wechRe, `<span class="text-yellow-500/90 underline decoration-yellow-600/70">$1</span>`);
        return <div className="leading-loose" dangerouslySetInnerHTML={{ __html: html }} />;
    };

    const generateTutorFeedback = (text) => {
        let fb = [];
        if(text.match(/\b(weil|dass|obwohl)\b/i)) fb.push("Nebensatz: verbo al final.");
        if(text.match(/\b(deshalb|deswegen|trotzdem)\b/i)) fb.push("Hauptsatz: inversión.");
        return fb.join("\n\n") || "Estructura correcta.";
    };
    const showAITutor = () => { setTutorMessage(generateTutorFeedback(guionData[getActualSceneIndex()].text)); setShowTutor(true); };

    const buyHearts = () => {
        if(userStats.coins >= 50) { setUserStats({...userStats, coins: userStats.coins-50, hearts: 5}); localStorage.setItem('mullerStats', JSON.stringify({...userStats, coins: userStats.coins-50, hearts: 5})); setShowDeathModal(false); }
        else alert("No tienes suficientes monedas.");
    };

    const startPractice = (type) => {
        if(type==='diff' && (!userStats.difficultVocab.length)) alert("Vacío");
        else if(type==='norm' && (!userStats.normalVocab.length)) alert("Vacío");
        else { setPracticeActive(type); setPracticeIndex(0); setPracticeShowTrans(false); }
    };
    const nextPracticeWord = () => {
        const list = practiceActive==='diff'?userStats.difficultVocab : userStats.normalVocab;
        if(practiceIndex < list.length-1) { setPracticeIndex(p=>p+1); setPracticeShowTrans(false); }
        else { alert("Sesión completada +20 XP +5 Coins"); setUserStats({...userStats, xp: userStats.xp+20, coins: userStats.coins+5}); localStorage.setItem('mullerStats', JSON.stringify({...userStats, xp: userStats.xp+20, coins: userStats.coins+5})); setPracticeActive(null); }
    };
    const playPracticeAudio = (text) => {
        const u = new SpeechSynthesisUtterance(text);
        u.lang='de-DE';
        window.speechSynthesis.speak(u);
    };
    const getArticleVisual = (word) => {
        if(word?.startsWith('der ')) return <span className="text-blue-400 mr-1">🔵</span>;
        if(word?.startsWith('die ')) return <span className="text-red-400 mr-1">🔴</span>;
        if(word?.startsWith('das ')) return <span className="text-green-400 mr-1">🟢</span>;
        return null;
    };

    const getBgColor = () => {
        if(activeTab === 'progreso') return 'bg-indigo-950';
        if(activeTab === 'guiones') return 'bg-slate-900';
        if(activeTab === 'vocabulario') return 'bg-amber-950';
        if(activeTab === 'historia') return 'bg-slate-900';
        return 'bg-gray-900';
    };

    return (
        <div className={`flex flex-col min-h-screen md:h-screen w-full text-gray-200 font-sans overflow-hidden transition-colors duration-500 ${getBgColor()}`}>
            {/* Barra superior */}
            <div className="bg-black/70 backdrop-blur-md border-b border-gray-700 p-2 flex flex-col md:flex-row gap-2 justify-between items-center z-20">
                <div className="flex gap-1 overflow-x-auto hide-scrollbar">
                    {['historia','vocabulario','guiones','progreso'].map(tab => (
                        <button key={tab} onClick={()=>{setActiveTab(tab); setMode('dialogue'); stopAudio(); setPracticeActive(null);}} className={`px-3 py-1.5 rounded-lg font-bold text-xs ${activeTab===tab ? 'bg-blue-700 text-white' : 'text-gray-400 hover:text-white'}`}>
                            <Icon name={tab==='historia'?'play':tab==='vocabulario'?'book-open':tab==='guiones'?'file-text':'bar-chart'} className="w-4 h-4 inline mr-1"/> {tab.charAt(0).toUpperCase()+tab.slice(1)}
                        </button>
                    ))}
                </div>
                <div className="flex items-center gap-2">
                    <div className="bg-gray-800/80 px-2 py-1 rounded-full flex gap-2 text-xs">
                        <span><Icon name="heart" className="w-4 h-4 inline fill-red-500"/> {userStats.hearts}</span>
                        <span><Icon name="coins" className="w-4 h-4 inline fill-yellow-500"/> {userStats.coins}</span>
                        <span><Icon name="user" className="w-4 h-4 inline"/> {userStats.username}</span>
                    </div>
                    <button onClick={()=>setPodcastMode(!podcastMode)} className={`px-2 py-1 rounded-lg text-xs ${podcastMode?'bg-indigo-700':'bg-gray-700'}`}><Icon name="car" className="w-4 h-4 inline"/> Podcast</button>
                    <button onClick={()=>setNoiseEnabled(!noiseEnabled)} className={`px-2 py-1 rounded-lg text-xs ${noiseEnabled?'bg-red-800 animate-pulse':'bg-gray-700'}`}><Icon name="volume-x" className="w-4 h-4 inline"/> Ruido</button>
                    <button onClick={()=>setFluesternMode(!fluesternMode)} className={`px-2 py-1 rounded-lg text-xs ${fluesternMode?'bg-gray-600':'bg-gray-700'}`}><Icon name="ear" className="w-4 h-4 inline"/> Flüstern</button>
                </div>
            </div>

            {/* Contenido principal */}
            <div className="flex-1 overflow-y-auto hide-scrollbar p-4">
                {activeTab === 'historia' && !practiceActive && (
                    <div className="max-w-4xl mx-auto">
                        <div className="bg-gray-800/60 rounded-2xl p-6 shadow-xl border border-gray-700">
                            <div className="text-sm text-blue-300 mb-2">{guionData[getActualSceneIndex()].speaker}</div>
                            <div className="text-2xl md:text-4xl font-medium leading-relaxed">{renderHighlightedText(guionData[getActualSceneIndex()].text, guionData[getActualSceneIndex()].vocab)}</div>
                            {!showCurrentTranslation && <button onClick={()=>setShowCurrentTranslation(true)} className="mt-4 text-gray-400 text-sm underline">Ver traducción</button>}
                            {showCurrentTranslation && <div className="mt-3 italic text-gray-300">"{guionData[getActualSceneIndex()].translation}"</div>}
                            <div className="flex flex-wrap gap-2 mt-6">
                                <button onClick={()=>setDiktatMode(!diktatMode)} className="bg-gray-700 px-3 py-1 rounded text-xs">Diktat</button>
                                <button onClick={()=>setTempusMode(!tempusMode)} className="bg-gray-700 px-3 py-1 rounded text-xs">Tempus</button>
                                <button onClick={()=>setArtikelSniperMode(!artikelSniperMode)} className="bg-gray-700 px-3 py-1 rounded text-xs">Artículos</button>
                                <button onClick={()=>setDeclinaMode(!declinaMode)} className="bg-gray-700 px-3 py-1 rounded text-xs">Declinar</button>
                                <button onClick={()=>setLueckentextMode(!lueckentextMode)} className="bg-gray-700 px-3 py-1 rounded text-xs">Huecos</button>
                                <button onClick={showAITutor} className="bg-blue-800 px-3 py-1 rounded text-xs">Tutor IA</button>
                            </div>
                            {diktatMode && (
                                <div className="mt-4 p-3 bg-gray-900 rounded">
                                    <textarea className="w-full bg-gray-800 p-2 rounded text-white" rows="3" placeholder="Escribe lo que oyes..." value={diktatInput} onChange={e=>setDiktatInput(e.target.value)}></textarea>
                                    <button onClick={()=>{setShowDiktatResult(true); if(diktatInput.toLowerCase().replace(/[.,!?]/g,'') !== guionData[getActualSceneIndex()].text.toLowerCase().replace(/[.,!?]/g,'')) { setUserStats({...userStats, hearts: userStats.hearts-1}); localStorage.setItem('mullerStats', JSON.stringify({...userStats, hearts: userStats.hearts-1})); } else { setUserStats({...userStats, coins: userStats.coins+5}); localStorage.setItem('mullerStats', JSON.stringify({...userStats, coins: userStats.coins+5})); } }} className="mt-2 bg-green-700 px-4 py-1 rounded">Corregir</button>
                                    {showDiktatResult && <div className="mt-2 p-2 bg-gray-800 rounded">{guionData[getActualSceneIndex()].text}</div>}
                                </div>
                            )}
                        </div>
                    </div>
                )}

                {activeTab === 'vocabulario' && !practiceActive && (
                    <div className="flex flex-col items-center justify-center min-h-[60vh]">
                        {currentVocabList.length === 0 ? (
                            <div className="text-center text-gray-400">No hay vocabulario. Guarda lecciones en Biblioteca.</div>
                        ) : (
                            <div className="max-w-2xl w-full text-center bg-gray-800/60 p-8 rounded-2xl">
                                <button onClick={playVocabAudio} className="bg-gray-700 p-4 rounded-full mb-6"><Icon name="volume-2" size={32}/></button>
                                <h1 className="text-5xl md:text-7xl font-bold break-words">{getArticleVisual(currentVocabList[vocabReviewIndex].de)}{currentVocabList[vocabReviewIndex].de}</h1>
                                {!showVocabTranslation ? (
                                    <div className="flex gap-4 justify-center mt-8">
                                        <button onClick={()=>setShowVocabTranslation(true)} className="bg-blue-700 px-8 py-3 rounded-xl">Revelar</button>
                                        <button onClick={()=>setShowHandwriting(true)} className="bg-amber-700 px-8 py-3 rounded-xl flex gap-2"><Icon name="pen-tool"/> Escribir</button>
                                    </div>
                                ) : (
                                    <div className="mt-8">
                                        <h2 className="text-2xl md:text-4xl text-green-300">{currentVocabList[vocabReviewIndex].es}</h2>
                                        <div className="flex gap-4 mt-6 justify-center">
                                            <button onClick={()=>handleVocabDifficulty('easy')} className="bg-green-700 px-4 py-2 rounded">Fácil</button>
                                            <button onClick={()=>handleVocabDifficulty('normal')} className="bg-blue-700 px-4 py-2 rounded">Normal</button>
                                            <button onClick={()=>handleVocabDifficulty('hard')} className="bg-red-700 px-4 py-2 rounded">Difícil</button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                    </div>
                )}

                {activeTab === 'guiones' && !practiceActive && (
                    <div className="max-w-6xl mx-auto flex flex-col md:flex-row gap-6">
                        <div className="flex-1 bg-gray-800/50 p-4 rounded-2xl">
                            <h2 className="text-xl font-bold text-blue-400">Añadir Guion</h2>
                            <input type="text" placeholder="Título" className="w-full bg-gray-700 p-2 rounded mt-2" value={newScriptTitle} onChange={e=>setNewScriptTitle(e.target.value)}/>
                            <textarea rows="6" className="w-full bg-gray-700 p-2 rounded mt-2 font-mono text-sm" value={scriptInput} onChange={e=>setScriptInput(e.target.value)}></textarea>
                            <button onClick={handleSaveScript} className="mt-3 bg-blue-700 w-full py-2 rounded">Guardar y estudiar</button>
                            <div className="mt-6"><h3 className="font-bold">Guiones guardados</h3>{savedScripts.map(s=> <div key={s.id} className="bg-gray-700 p-2 rounded mt-2 flex justify-between"><span>{s.title}</span><button onClick={()=>loadSavedScript(s)} className="bg-blue-600 px-2 rounded">Cargar</button></div>)}</div>
                        </div>
                        <div className="flex-1 bg-amber-900/30 p-4 rounded-2xl border border-amber-700">
                            <h2 className="text-xl font-bold text-amber-400">Lecciones de Vocabulario</h2>
                            <div className="flex gap-2 mt-2">
                                <input type="text" placeholder="Título" className="bg-gray-700 p-1 rounded text-sm flex-1" value={vocabTitleInput} onChange={e=>setVocabTitleInput(e.target.value)}/>
                                <button onClick={handleSaveCustomVocab} className="bg-amber-700 px-3 py-1 rounded text-sm">Guardar</button>
                            </div>
                            <textarea rows="3" placeholder="Pega lista (palabra - traducción)" className="w-full bg-gray-700 p-2 rounded mt-2 text-sm" value={vocabTextInput} onChange={e=>setVocabTextInput(e.target.value)}></textarea>
                            <div className="mt-4 max-h-60 overflow-y-auto space-y-2">
                                {customVocabLessons.map(lesson => (
                                    <div key={lesson.id} className="bg-gray-800 p-2 rounded flex justify-between items-center">
                                        <div><span className="font-bold">{lesson.title}</span> ({lesson.words.length})</div>
                                        <button onClick={()=>{setCurrentVocabList(lesson.words); setActiveScriptTitle(lesson.title); setVocabReviewIndex(0); setShowVocabTranslation(false); setActiveTab('vocabulario');}} className="bg-amber-600 px-2 py-0.5 rounded text-xs">Tarjetas</button>
                                    </div>
                                ))}
                            </div>
                            {customVocabLessons.length>0 && (
                                <div className="mt-4 border-t border-amber-700 pt-3">
                                    <p className="text-sm font-bold">Selecciona para mezclar:</p>
                                    <div className="flex flex-wrap gap-2 mt-1">
                                        {customVocabLessons.map(l=> <label key={l.id} className="flex items-center gap-1 text-xs"><input type="checkbox" onChange={e=>{if(e.target.checked) setSelectedLessonIds([...selectedLessonIds, l.id]); else setSelectedLessonIds(selectedLessonIds.filter(id=>id!==l.id))}}/>{l.title}</label>)}
                                    </div>
                                    <button onClick={()=>{let all=[]; selectedLessonIds.forEach(id=>{const les=customVocabLessons.find(l=>l.id===id); if(les) all.push(...les.words);}); if(!all.length) return; for(let i=all.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[all[i],all[j]]=[all[j],all[i]];} const diff=all.filter(w=>w.diff===1); setCurrentVocabList([...all,...diff]); setActiveScriptTitle("Mezcla"); setVocabReviewIndex(0); setShowVocabTranslation(false); setActiveTab('vocabulario');}} className="mt-2 w-full bg-purple-700 py-1 rounded text-sm">Practicar mezcla</button>
                                </div>
                            )}
                        </div>
                    </div>
                )}

                {activeTab === 'progreso' && !practiceActive && (
                    <div className="max-w-4xl mx-auto">
                        <div className="flex justify-between items-center mb-6">
                            <h1 className="text-3xl font-bold text-yellow-500">Progreso</h1>
                            <div className="flex gap-2">
                                <button onClick={exportAllData} className="bg-blue-700 px-3 py-1 rounded text-sm">Exportar</button>
                                <label className="bg-green-700 px-3 py-1 rounded text-sm cursor-pointer">Importar<input type="file" accept=".json" className="hidden" onChange={e=>importAllData(e.target.files[0])}/></label>
                            </div>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                            <div className="bg-gray-800 p-4 rounded-2xl"><h2 className="font-bold text-red-400">Vocabulario Difícil</h2><ul className="max-h-40 overflow-y-auto text-sm mt-2">{userStats.difficultVocab.map((v,i)=><li key={i}>{v.de} - {v.es}</li>)}</ul><button onClick={()=>startPractice('diff')} className="mt-3 bg-red-700 w-full py-1 rounded">Practicar</button></div>
                            <div className="bg-gray-800 p-4 rounded-2xl"><h2 className="font-bold text-blue-400">Vocabulario Normal</h2><ul className="max-h-40 overflow-y-auto text-sm mt-2">{userStats.normalVocab.map((v,i)=><li key={i}>{v.de} - {v.es}</li>)}</ul><button onClick={()=>startPractice('norm')} className="mt-3 bg-blue-700 w-full py-1 rounded">Practicar</button></div>
                        </div>
                    </div>
                )}

                {practiceActive && (
                    <div className="flex flex-col items-center justify-center h-full">
                        <div className="bg-gray-800/90 p-8 rounded-3xl max-w-2xl w-full text-center">
                            <button onClick={()=>playPracticeAudio(practiceActive==='diff'?userStats.difficultVocab[practiceIndex]?.de:userStats.normalVocab[practiceIndex]?.de)} className="bg-gray-700 p-4 rounded-full mb-4"><Icon name="volume-2"/></button>
                            <h1 className="text-5xl font-bold">{practiceActive==='diff'?userStats.difficultVocab[practiceIndex]?.de:userStats.normalVocab[practiceIndex]?.de}</h1>
                            {!practiceShowTrans ? <button onClick={()=>setPracticeShowTrans(true)} className="mt-6 bg-blue-700 px-6 py-2 rounded-xl">Revelar</button> : (
                                <div><p className="text-2xl text-green-300 mt-4">{practiceActive==='diff'?userStats.difficultVocab[practiceIndex]?.es:userStats.normalVocab[practiceIndex]?.es}</p><button onClick={nextPracticeWord} className="mt-6 bg-green-700 px-6 py-2 rounded-xl">Siguiente</button></div>
                            )}
                        </div>
                    </div>
                )}
            </div>

            {/* Controles de reproducción (solo historia) */}
            {activeTab === 'historia' && !practiceActive && (
                <div className="bg-gray-900/90 p-3 flex justify-between items-center border-t border-gray-700">
                    <button onClick={handlePrev} className="p-2 rounded-full bg-gray-700"><Icon name="skip-back"/></button>
                    <button onClick={togglePlay} className={`p-4 rounded-full ${isPlaying?'bg-red-700':'bg-blue-700'}`}>{isPlaying?<Icon name="square"/>:<Icon name="play"/>}</button>
                    <button onClick={handleNext} className="p-2 rounded-full bg-gray-700"><Icon name="skip-forward"/></button>
                    <div className="flex items-center gap-2"><Icon name="sliders"/><input type="range" min="0.5" max="1.5" step="0.01" value={playbackRate} onChange={e=>setPlaybackRate(parseFloat(e.target.value))}/><span className="text-xs">{playbackRate}x</span></div>
                </div>
            )}

            {/* Modales */}
            {showLoginModal && (
                <div className="fixed inset-0 bg-black/90 flex items-center justify-center z-50">
                    <div className="bg-gray-800 p-8 rounded-2xl text-center">
                        <Icon name="crown" className="w-16 h-16 text-amber-500 mx-auto"/>
                        <input type="text" placeholder="Nombre" className="bg-gray-700 p-3 rounded mt-4 w-full" value={tempUsername} onChange={e=>setTempUsername(e.target.value)}/>
                        <button onClick={()=>{if(tempUsername.trim()){ setUserStats({...userStats, username: tempUsername}); localStorage.setItem('mullerStats', JSON.stringify({...userStats, username: tempUsername})); setShowLoginModal(false); }}} className="mt-4 bg-amber-600 px-6 py-2 rounded w-full">Empezar</button>
                    </div>
                </div>
            )}
            {showDeathModal && (
                <div className="fixed inset-0 bg-black/90 flex items-center justify-center z-50">
                    <div className="bg-gray-800 p-8 rounded-2xl text-center">
                        <Icon name="heart" className="w-16 h-16 text-red-500 mx-auto"/>
                        <h2 className="text-2xl font-bold mt-2">Sin vidas</h2>
                        <button onClick={buyHearts} className="mt-4 bg-yellow-600 px-6 py-2 rounded">Comprar 5 ❤️ (50 coins)</button>
                    </div>
                </div>
            )}
            {showTutor && (
                <div className="fixed inset-0 bg-black/90 flex items-center justify-center z-50 p-4">
                    <div className="bg-gray-800 p-6 rounded-2xl max-w-2xl w-full">
                        <h2 className="text-2xl font-bold text-blue-400">Tutor IA</h2>
                        <p className="mt-4 whitespace-pre-wrap">{tutorMessage}</p>
                        <button onClick={()=>setShowTutor(false)} className="mt-6 bg-blue-700 w-full py-2 rounded">Cerrar</button>
                    </div>
                </div>
            )}
            {showHandwriting && <HandwritingPad onClose={()=>setShowHandwriting(false)} onSave={(data)=>{ console.log("Dibujo guardado", data); alert("Dibujo guardado (puedes comparar visualmente)"); }} />}
        </div>
    );
}

// ==================== RENDERIZAR ====================
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
