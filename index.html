    const [newScriptTitle, setNewScriptTitle] = useState("");
    const [scriptInput, setScriptInput] = useState(`Lukas: Hallo Elena! (¡Hola Elena!) [der Tag - el día]\nElena: Ja, ich bin froh! (¡Sí, estoy contenta!) [froh - contento]`);
    const [showLoginModal, setShowLoginModal] = useState(false);
    const [tempUsername, setTempUsername] = useState("");
    const [showTutor, setShowTutor] = useState(false);
    const [tutorMessage, setTutorMessage] = useState("");
    const [showDeathModal, setShowDeathModal] = useState(false);
    const [showGrammarPrompt, setShowGrammarPrompt] = useState(false);
    const [customGrammarInput, setCustomGrammarInput] = useState("");
    const [selectedLessonIds, setSelectedLessonIds] = useState([]);
    const [handwritingMode, setHandwritingMode] = useState(false);
    const [noiseEnabled, setNoiseEnabled] = useState(false);
    const [noiseSource, setNoiseSource] = useState(null);
    const [noiseCtx, setNoiseCtx] = useState(null);

    const isPlayingRef = useRef(false);
    const timeoutRef = useRef(null);
    const recognitionRef = useRef(null);
    const spokenTextRef = useRef("");

    // ========== EFECTOS ORIGINALES (con pequeñas correcciones) ==========
    useEffect(() => { if(window.lucide) window.lucide.createIcons(); }, []);
    useEffect(() => {
        const saved = localStorage.getItem('mullerStats');
        if(saved) setUserStats(JSON.parse(saved));
        else setShowLoginModal(true);
        const scripts = localStorage.getItem('mullerScripts');
        if(scripts) setSavedScripts(JSON.parse(scripts));
        const vocab = localStorage.getItem('mullerCustomVocab');
        if(vocab) setCustomVocabLessons(JSON.parse(vocab));
        const handleVoices = () => setVoicesLoaded(true);
        window.speechSynthesis.addEventListener('voiceschanged', handleVoices);
        if(window.speechSynthesis.getVoices().length) setVoicesLoaded(true);
        return () => window.speechSynthesis.removeEventListener('voiceschanged', handleVoices);
    }, []);
    useEffect(() => { isPlayingRef.current = isPlaying; }, [isPlaying]);
    useEffect(() => {
        if(activeTab !== 'vocabulario') {
            const allVocab = [];
            guionData.forEach(scene => {
                if(scene.vocab) scene.vocab.forEach(v => { if(!allVocab.some(e=>e.de===v.de)) allVocab.push(v); });

            setCurrentVocabList(allVocab);
            setVocabReviewIndex(0);
            setShowVocabTranslation(false);
        }
    }, [guionData, activeTab]);
    useEffect(() => {
        const db = activeTab === 'b1meister' ? B1_DATABASE : B2_DATABASE;
        if(bxCategory === 'mix') {
            let mixed = [];
            Object.values(db).forEach(arr => mixed = mixed.concat(arr));
            mixed.sort(() => Math.random() - 0.5);
            setBxCurrentList(mixed);
        } else setBxCurrentList(db[bxCategory] || []);
        setBxIndex(0);
    }, [bxCategory, activeTab]);

    // ========== FUNCIONES AUXILIARES (originales, con ruido añadido) ==========
    const saveProgress = (updates) => {
        const merged = { ...userStats, ...updates, lastPlayedDate: new Date().toISOString().split('T')[0] };
        setUserStats(merged);
        localStorage.setItem('mullerStats', JSON.stringify(merged));
    };
    const deductHeart = () => {
        if(userStats.hearts <= 1) { saveProgress({ hearts: 0 }); stopAudio(); setShowDeathModal(true); }
        else saveProgress({ hearts: userStats.hearts - 1 });
    };
    const buyHearts = () => {
        if(userStats.coins >= 50) { saveProgress({ coins: userStats.coins - 50, hearts: 5 }); setShowDeathModal(false); }
        else alert("No tienes suficientes monedas.");
    };
    const stopAudio = () => {
        window.speechSynthesis.cancel();
        if(timeoutRef.current) clearTimeout(timeoutRef.current);
        setIsPlaying(false);
        if(noiseSource) { try { noiseSource.stop(); noiseCtx?.close(); } catch(e){} setNoiseSource(null); setNoiseCtx(null); }
    };
    const getActualSceneIndex = () => isReviewing ? userStats.failedDiktatScenes[reviewIndexPointer] : sceneIndex;
    const proceedToNextStage = () => {
        if(isReviewing) {
            if(reviewIndexPointer < userStats.failedDiktatScenes.length - 1) { setReviewIndexPointer(p=>p+1); setMode('dialogue'); resetModes(); }
            else { saveProgress({ failedDiktatScenes: [] }); setIsReviewing(false); stopAudio(); }
        } else {
            if(sceneIndex < guionData.length - 1) { setSceneIndex(s=>s+1); setMode('dialogue'); resetModes(); }
            else {
                if(userStats.failedDiktatScenes.length) { alert("Historia terminada. Repaso de fallos."); setIsReviewing(true); setReviewIndexPointer(0); setMode('dialogue'); resetModes(); }
                else { stopAudio(); alert("¡Completaste el guion!"); }
            }
        }
    };
    const resetModes = () => {
        setDiktatInput(""); setShowDiktatResult(false);
        setSpokenText(""); setPronunciationScore(null); setGrammarPolizeiMsg(""); setPronunciationFeedback([]);
        setShowPuzzleResult(false); setShowCurrentTranslation(false);
        if(puzzleMode) initPuzzle(guionData[getActualSceneIndex()]?.text);
    };
    const handleNext = () => { stopAudio(); proceedToNextStage(); };
    const handlePrev = () => { stopAudio(); if(!isReviewing && sceneIndex>0) { setSceneIndex(s=>s-1); setMode('dialogue'); resetModes(); } };
    const togglePlay = () => {
        if(userStats.hearts <= 0) setShowDeathModal(true);
        else if(isPlaying) stopAudio();
        else setIsPlaying(true);
    };
    const initPuzzle = (text) => { if(!text) return; const words = text.split(/\s+/).map((w,i)=>({id:i, text:w})); setPuzzleWords(words.sort(()=>Math.random()-0.5)); setPuzzleAnswer([]); };
    useEffect(() => { if(puzzleMode && activeTab==='historia') initPuzzle(guionData[getActualSceneIndex()]?.text); }, [sceneIndex, isReviewing, puzzleMode, guionData, activeTab]);

    // ========== FUNCIÓN DE AUDIO CON RUIDO (CORREGIDA) ==========
    const getVoice = (lang, gender, isOlder = false) => {
        const voices = window.speechSynthesis.getVoices();
        const langVoices = voices.filter(v => v.lang.startsWith(lang));
        if(!langVoices.length) return voices[0];
        if(gender === 'female') return langVoices.find(v => /female|Katja|Marlene/i.test(v.name)) || langVoices[0];
        if(gender === 'male') return langVoices.find(v => /male|Stefan|Conrad|Klaus/i.test(v.name)) || langVoices[0];
        return langVoices[0];
    };
    const playSceneAudio = (text, speaker) => {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'de-DE';
        if(speaker === 'Lukas') utterance.voice = getVoice('de', 'male');
        else if(speaker === 'Elena' || speaker === 'Anna') utterance.voice = getVoice('de', 'female');
        else if(speaker.includes('Weber')) utterance.voice = getVoice('de', 'male', true);
        utterance.rate = (speaker.includes('Weber')?0.9:1.0) * playbackRate;
        if(fluesternMode) utterance.volume = 0.3;
        else utterance.volume = 1.0;

        // Ruido de fondo (si está activado)
        if(noiseEnabled && !noiseSource) {
            try {
                const AudioCtx = window.AudioContext || window.webkitAudioContext;
                const ctx = new AudioCtx();
                const gain = ctx.createGain();
                gain.gain.value = 0.1;
                const bufferSize = 4096;
                const noiseBuffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                const output = noiseBuffer.getChannelData(0);
                for(let i=0; i<bufferSize; i++) output[i] = Math.random() * 2 - 1;
                const src = ctx.createBufferSource();
                src.buffer = noiseBuffer;
                src.loop = true;
                src.connect(gain);
                gain.connect(ctx.destination);
                src.start();
                setNoiseSource(src);
                setNoiseCtx(ctx);
            } catch(e) { console.warn("Ruido no soportado"); }
        }
        return utterance;
    };

    // Efecto de reproducción automática (CORREGIDO)
    useEffect(() => {
        if(!isPlaying || !voicesLoaded || mode !== 'dialogue' || activeTab !== 'historia') return;
        const current = guionData[getActualSceneIndex()];
        if(!current) return;
        const utterance = playSceneAudio(current.text, current.speaker);
        let utterances = [utterance];
        if(current.vocab && current.vocab.length && !podcastMode && !diktatMode && !puzzleMode && !declinaMode && !artikelSniperMode) {
            current.vocab.forEach(v => {
                const uDe = new SpeechSynthesisUtterance(v.de);
                uDe.lang='de-DE'; uDe.voice=getVoice('de','female'); uDe.rate=0.85;
                utterances.push(uDe);
                const uEs = new SpeechSynthesisUtterance(v.es);
                uEs.lang='es-ES'; uEs.voice=getVoice('es','male'); uEs.rate=0.9;
                utterances.push(uEs);
            });
        }
        if(podcastMode) {
            const esUtter = new SpeechSynthesisUtterance(current.translation || "");
            esUtter.lang='es-ES'; esUtter.voice=getVoice('es','male'); esUtter.rate=1.0;
            utterances = [utterance, esUtter];
        }
        utterances[utterances.length-1].onend = () => {
            if(isPlayingRef.current) {
                if(diktatMode || puzzleMode || declinaMode || artikelSniperMode) { setIsPlaying(false); return; }
                timeoutRef.current = setTimeout(() => proceedToNextStage(), podcastMode?1500:800);

        utterances.forEach(u => window.speechSynthesis.speak(u));

    // ========== RESTO DE FUNCIONES ORIGINALES (handleSaveCustomVocab, handleSaveScript, etc.) ==========

    const handleSaveCustomVocab = () => { /* ... tu código ... */ };

    const handleVoiceStop = () => { /* ... */ };
    const evaluatePronunciation = (targetText, transcript) => { /* ... */ };
    const playVocabAudio = () => { /* ... */ };
    const handleVocabDifficulty = (level) => { /* ... */ };
    const startPractice = (type) => { /* ... */ };
    const playPracticeAudio = (text) => { /* ... */ };
    const nextPracticeWord = () => { /* ... */ };
    const getArticleVisual = (word) => { /* ... */ };
    const exportToAnki = (type) => { /* ... */ };
    const exportScriptPDF = () => { /* ... */ };
    const exportProgressPDF = () => { /* ... */ };

    // ========== ACTUALIZACIÓN DE TEMPUS ==========
    const updateTempusVerbList = (text) => {
        if(!tempusMode || !text) { setTempusVerbList([]); return; }
        const words = text.split(/\s+/);
        const found = [];
        const processed = new Set();
        words.forEach(word => {
            const clean = word.toLowerCase().replace(/[.,!?;:()]/g,'');
            if(TEMPUS_DICT[clean] && !processed.has(clean)) {
                found.push({ infinitive: clean, forms: TEMPUS_DICT[clean] });
                processed.add(clean);
            }
        });
        setTempusVerbList(found);
    };
    useEffect(() => {
        const idx = getActualSceneIndex();
        const scene = guionData[idx];
        if(scene && tempusMode) updateTempusVerbList(scene.text);
        else setTempusVerbList([]);
    }, [sceneIndex, isReviewing, tempusMode, guionData]);

    // ========== RENDER HIGHLIGHTED TEXT (con colores suaves) ==========
    const renderHighlightedText = (text, vocabList) => {
        let html = text;
        if(artikelSniperMode) html = html.replace(/\b(der|die|das|den|dem|des)\b/gi, '<span class="bg-red-800/40 text-red-200 border-b border-red-500/60 px-1 rounded">[???]</span>');
        if(declinaMode) html = html.replace(/\b(d|ein|kein|mein|dein|sein|ihr|unser|euer)(er|en|em|es|e|as|ie)\b/gi, '$1<span class="text-pink-300 bg-pink-800/30 border-b border-pink-500/60 px-1 rounded">[ _ ]</span>');
        if(vocabList?.length) {
            const sorted = [...vocabList].sort((a,b)=>b.de.length - a.de.length);
            sorted.forEach(v => {
                const search = v.de.replace(/^(der|die|das|sich)\s/i,'').trim().replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
                const regex = new RegExp(`(?![^<]*>)(^|[^a-zäöüßA-ZÄÖÜẞ])(${search})([^a-zäöüßA-ZÄÖÜẞ]|$)`, 'gi');
                if(lueckentextMode) html = html.replace(regex, `$1<span class="bg-gray-800 text-transparent border-b border-yellow-500/70 px-2 mx-0.5 select-none">[???]</span>$3`);
                else html = html.replace(regex, `$1<span class="bg-amber-500/20 text-amber-100 border-b border-amber-400/60 px-1 rounded-sm" title="${v.es}">$2</span>$3`);
            });
        }
        GRAMMAR_PATTERNS.forEach(p => {
            html = html.replace(p.regex, `<span class="bg-cyan-800/40 text-cyan-200 border-b border-cyan-400/60 px-1 rounded-sm" title="${p.tooltip}">$1</span>`);
        });
        if(tempusMode) {
            Object.keys(TEMPUS_DICT).forEach(v => {
                const re = new RegExp(`\\b(${v})\\b`,'gi');
                html = html.replace(re, `$1 <span class="text-blue-200 text-[10px] bg-blue-800/50 border border-blue-500/50 px-1 rounded">(${TEMPUS_DICT[v]})</span>`);
            });
        }
        const connRe = new RegExp(`\\b(${CONN_LIST.join('|')})\\b`,'gi');
        html = html.replace(connRe, `<span class="text-purple-300 underline decoration-purple-500/70">$1</span>`);
        const datRe = new RegExp(`\\b(${PREP_DAT.join('|')})\\b`,'gi');
        html = html.replace(datRe, `<span class="text-blue-300 underline decoration-blue-500/70">$1</span>`);
        const akkRe = new RegExp(`\\b(${PREP_AKK.join('|')})\\b`,'gi');
        html = html.replace(akkRe, `<span class="text-red-300 underline decoration-red-500/70">$1</span>`);
        const wechRe = new RegExp(`\\b(${PREP_WECHSEL.join('|')})\\b`,'gi');
        html = html.replace(wechRe, `<span class="text-yellow-500/90 underline decoration-yellow-600/70">$1</span>`);
        return <div className="leading-loose" dangerouslySetInnerHTML={{ __html: html }} />;
    };
    const renderDiktatDiff = (original, typed) => { /* ... tu código ... */ };

    // ========== COMPONENTE DE ESCRITURA A MANO ==========
    const HandwritingPad = ({ onClose, onSave }) => {
        const canvasRef = useRef(null);
        const drawingRef = useRef(false);
        useEffect(() => {
            const canvas = canvasRef.current;
            if(!canvas) return;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = 'white';
            ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.strokeStyle = '#1e293b';
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';
            const draw = (e) => {
                if(!drawingRef.current) return;
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                let x,y;
                if(e.touches) { x = (e.touches[0].clientX - rect.left)*scaleX; y = (e.touches[0].clientY - rect.top)*scaleY; }
                else { x = (e.clientX - rect.left)*scaleX; y = (e.clientY - rect.top)*scaleY; }
                ctx.lineTo(x, y);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(x, y);
            };
            const start = (e) => {
                drawingRef.current = true;
                ctx.beginPath();
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                let x,y;
                if(e.touches) { x = (e.touches[0].clientX - rect.left)*scaleX; y = (e.touches[0].clientY - rect.top)*scaleY; }
                else { x = (e.clientX - rect.left)*scaleX; y = (e.clientY - rect.top)*scaleY; }
                ctx.moveTo(x, y);
                e.preventDefault();
            };
            const end = () => { drawingRef.current = false; ctx.beginPath(); };
            canvas.addEventListener('pointerdown', start);
            canvas.addEventListener('pointermove', draw);
            canvas.addEventListener('pointerup', end);
            canvas.addEventListener('touchstart', start);
            canvas.addEventListener('touchmove', draw);
            canvas.addEventListener('touchend', end);
            return () => {
                canvas.removeEventListener('pointerdown', start);
                canvas.removeEventListener('pointermove', draw);
                canvas.removeEventListener('pointerup', end);
            };
        }, []);
        const clearCanvas = () => {
            const canvas = canvasRef.current;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = 'white';
            ctx.fillRect(0,0,canvas.width,canvas.height);
        };
        return (
            <div className="fixed inset-0 bg-black/90 flex items-center justify-center z-50 p-4">
                <div className="bg-slate-800 rounded-2xl p-4 max-w-2xl w-full">
                    <h3 className="text-white font-bold mb-2">✍️ Escribe a mano</h3>
                    <canvas ref={canvasRef} width={600} height={300} className="handwriting-canvas"></canvas>
                    <div className="flex gap-3 mt-4">
                        <button onClick={clearCanvas} className="bg-red-700 px-4 py-2 rounded-lg">Borrar</button>
                        <button onClick={() => { onSave(canvasRef.current.toDataURL()); onClose(); }} className="bg-green-700 px-4 py-2 rounded-lg">Usar dibujo</button>
                        <button onClick={onClose} className="bg-gray-600 px-4 py-2 rounded-lg">Cancelar</button>
                    </div>
                </div>
            </div>
        );
    };
    const [showHandwriting, setShowHandwriting] = useState(false);

    // ========== SISTEMA DE SINCRONIZACIÓN (EXPORTAR/IMPORTAR) ==========
    const exportAllData = () => {
        const data = { userStats, savedScripts, customVocabLessons, srsData: JSON.parse(localStorage.getItem('muller_srs_data')||'{}') };
        const blob = new Blob([JSON.stringify(data)], {type:'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `muller_backup_${new Date().toISOString().slice(0,19)}.json`;
        a.click();
        URL.revokeObjectURL(a.href);
    };
    const importAllData = (file) => {
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const data = JSON.parse(e.target.result);
                if(data.userStats) { localStorage.setItem('mullerStats', JSON.stringify(data.userStats)); setUserStats(data.userStats); }
                if(data.savedScripts) { localStorage.setItem('mullerScripts', JSON.stringify(data.savedScripts)); setSavedScripts(data.savedScripts); }
                if(data.customVocabLessons) { localStorage.setItem('mullerCustomVocab', JSON.stringify(data.customVocabLessons)); setCustomVocabLessons(data.customVocabLessons); }
                if(data.srsData) localStorage.setItem('muller_srs_data', JSON.stringify(data.srsData));
                alert("Importado. Recarga la página.");
                window.location.reload();
            } catch(err) { alert("Archivo inválido"); }
        };
        reader.readAsText(file);
    };

    // ========== COLOR DE FONDO SUAVE (sin rojos intensos) ==========
    const getBgColor = () => {
        if(activeTab === 'progreso') return 'bg-indigo-950';
        if(activeTab === 'guiones') return 'bg-slate-900';
        if(activeTab === 'vocabulario') return 'bg-amber-950';
        if(activeTab === 'b1meister' || activeTab === 'b2ausblick') return 'bg-sky-950';
        if(activeTab === 'storybuilder') return 'bg-fuchsia-950';
        if(fluesternMode) return 'bg-zinc-900';
        if(isReviewing || practiceActive) return 'bg-slate-900'; // antes era red-950
        const speaker = guionData[getActualSceneIndex()]?.speaker;
        if(speaker === 'Lukas') return 'bg-slate-900';
        if(speaker === 'Elena' || speaker === 'Anna') return 'bg-slate-800';
        if(speaker?.includes('Weber')) return 'bg-slate-900';
        return 'bg-gray-900';
    };

    // ========== RENDER PRINCIPAL (con las mejoras integradas) ==========
    return (
        <div className={`flex flex-col min-h-screen md:h-screen w-full text-gray-200 font-sans overflow-hidden transition-colors duration-500 ${getBgColor()}`}>
            {/* Barra superior (igual que tu original, solo cambio colores) */}
            <div className="w-full bg-black/80 backdrop-blur-md border-b border-gray-700 p-2 md:p-3 flex flex-col md:flex-row gap-2 md:gap-3 justify-between items-center z-20">
                <div className="flex gap-1 md:gap-2 bg-black/50 p-1 rounded-xl w-full md:w-auto overflow-x-auto hide-scrollbar">
                    <button onClick={()=>{setActiveTab('historia'); setMode('dialogue'); stopAudio(); setPracticeActive(null);}} className={`flex items-center gap-1 md:gap-2 px-2 md:px-3 py-1.5 md:py-2 rounded-lg font-bold text-xs transition ${activeTab === 'historia' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:text-white whitespace-nowrap'}`}><Icon name="play" className="w-3 h-3 md:w-4 md:h-4" /> Historia</button>
                    <button onClick={()=>{setActiveTab('vocabulario'); stopAudio(); setPracticeActive(null);}} className={`flex items-center gap-1 md:gap-2 px-2 md:px-3 py-1.5 md:py-2 rounded-lg font-bold text-xs transition ${activeTab === 'vocabulario' ? 'bg-amber-600 text-white' : 'text-gray-400 hover:text-white whitespace-nowrap'}`}><Icon name="book-open" className="w-3 h-3 md:w-4 md:h-4" /> Vocab</button>
                    <button onClick={()=>{setActiveTab('b1meister'); stopAudio(); setPracticeActive(null); setBxCategory('mix');}} className={`flex items-center gap-1 md:gap-2 px-2 md:px-3 py-1.5 md:py-2 rounded-lg font-bold text-xs transition ${activeTab === 'b1meister' ? 'bg-emerald-600 text-white' : 'text-gray-400 hover:text-white whitespace-nowrap'}`}><Icon name="target" className="w-3 h-3 md:w-4 md:h-4" /> B1</button>
                    <button onClick={()=>{setActiveTab('b2ausblick'); stopAudio(); setPracticeActive(null); setBxCategory('mix');}} className={`flex items-center gap-1 md:gap-2 px-2 md:px-3 py-1.5 md:py-2 rounded-lg font-bold text-xs transition ${activeTab === 'b2ausblick' ? 'bg-sky-600 text-white' : 'text-gray-400 hover:text-white whitespace-nowrap'}`}><Icon name="layers" className="w-3 h-3 md:w-4 md:h-4" /> B2</button>
                    <button onClick={()=>{setActiveTab('progreso'); stopAudio(); setPracticeActive(null);}} className={`flex items-center gap-1 md:gap-2 px-2 md:px-3 py-1.5 md:py-2 rounded-lg font-bold text-xs transition ${activeTab === 'progreso' ? 'bg-yellow-600 text-white' : 'text-gray-400 hover:text-white whitespace-nowrap'}`}><Icon name="bar-chart" className="w-3 h-3 md:w-4 md:h-4" /> Progreso</button>
                    <button onClick={()=>{setActiveTab('guiones'); stopAudio(); setPracticeActive(null);}} className={`flex items-center gap-1 md:gap-2 px-2 md:px-3 py-1.5 md:py-2 rounded-lg font-bold text-xs transition ${activeTab === 'guiones' ? 'bg-purple-600 text-white' : 'text-gray-400 hover:text-white whitespace-nowrap'}`}><Icon name="file-text" className="w-3 h-3 md:w-4 md:h-4" /> Biblioteca</button>
                    <button onClick={()=>{setActiveTab('storybuilder'); stopAudio(); setPracticeActive(null);}} className={`flex items-center gap-1 md:gap-2 px-2 md:px-3 py-1.5 md:py-2 rounded-lg font-bold text-xs transition ${activeTab === 'storybuilder' ? 'bg-fuchsia-600 text-white' : 'text-gray-400 hover:text-white whitespace-nowrap'}`}><Icon name="sparkles" className="w-3 h-3 md:w-4 md:h-4" /> IA</button>
                </div>
                <div className="flex items-center gap-2 md:gap-3 overflow-x-auto w-full md:w-auto pb-1 md:pb-0 justify-end">
                    <div className="flex items-center gap-2 md:gap-3 bg-black/60 px-2 py-1 md:px-3 md:py-1.5 rounded-full border border-gray-700 whitespace-nowrap">
                        {userStats.username && (
                            <span className="flex items-center gap-1 font-bold text-amber-500 text-xs uppercase mr-1 md:mr-2 border-r border-gray-700 pr-2 md:pr-3">
                                {userStats.isPremium ? <Icon name="crown" className="w-3 h-3 md:w-4 md:h-4" /> : <Icon name="user-circle" className="w-3 h-3 md:w-4 md:h-4" />} <span className="hidden xs:inline">{userStats.username}</span>
                            </span>
                        )}
                        <span className="flex items-center gap-1 font-black text-red-400 text-xs md:text-sm"><Icon name="heart" className="w-3 h-3 md:w-4 md:h-4 fill-current" /> {userStats.hearts}</span>
                        <span className="flex items-center gap-1 font-black text-yellow-400 text-xs md:text-sm"><Icon name="coins" className="w-3 h-3 md:w-4 md:h-4 fill-current" /> {userStats.coins}</span>
                    </div>
                    <button onClick={()=>{setPodcastMode(!podcastMode); setBlindMode(false); setDiktatMode(false); setPuzzleMode(false);}} className={`flex items-center gap-1 px-2 md:px-3 py-1 md:py-1.5 rounded-lg text-xs font-bold transition border border-gray-700 whitespace-nowrap ${podcastMode ? 'bg-indigo-600 text-white' : 'bg-black/50 text-gray-300 hover:bg-white/10'}`}><Icon name="car" className="w-3 h-3 md:w-4 md:h-4" /> Podcast</button>
                    <button onClick={()=>setNoiseEnabled(!noiseEnabled)} className={`flex items-center gap-1 px-2 md:px-3 py-1 md:py-1.5 rounded-lg text-xs font-bold transition border border-gray-700 ${noiseEnabled ? 'bg-red-800 text-white animate-pulse' : 'bg-black/50 text-gray-300 hover:bg-white/10'}`}><Icon name="volume-x" className="w-3 h-3 md:w-4 md:h-4" /> Ruido</button>
                    <button onClick={()=>setFluesternMode(!fluesternMode)} className={`flex items-center gap-1 px-2 md:px-3 py-1 md:py-1.5 rounded-lg text-xs font-bold transition border border-gray-700 ${fluesternMode ? 'bg-gray-600 text-white' : 'bg-black/50 text-gray-300 hover:bg-white/10'}`}><Icon name="ear" className="w-3 h-3 md:w-4 md:h-4" /> Flüstern</button>
                </div>
            </div>

            {/* CONTENIDO PRINCIPAL (TUS PESTAÑAS ORIGINALES, solo modifico colores y añado botón sincronización en Progreso) */}
            <div className="flex-1 overflow-y-auto relative flex flex-col hide-scrollbar">
                {/* Storybuilder (igual) */}
                {activeTab === 'storybuilder' && ( /* tu código */ )}
                {/* B1 / B2 (igual) */}
                {(activeTab === 'b1meister' || activeTab === 'b2ausblick') && !practiceActive && ( /* tu código */ )}
                {/* Progreso (con botones exportar/importar) */}
                {activeTab === 'progreso' && !practiceActive && (
                    <div className="p-4 md:p-8 max-w-5xl mx-auto w-full animate-in fade-in duration-500">
                        <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 md:mb-8 gap-4">
                            <h1 className="text-2xl md:text-4xl font-black flex items-center gap-2 md:gap-3 text-yellow-500"><Icon name="award" className="w-8 h-8 md:w-10 md:h-10" /> Dashboard Profesional B1</h1>
                            <div className="flex gap-2">
                                <button onClick={exportAllData} className="bg-blue-700 hover:bg-blue-600 text-white px-4 md:px-5 py-2 md:py-3 rounded-xl font-bold flex items-center gap-2 shadow-lg transition text-xs md:text-sm"><Icon name="download" className="w-4 h-4 md:w-5 md:h-5" /> Exportar</button>
                                <label className="bg-green-700 hover:bg-green-600 text-white px-4 md:px-5 py-2 md:py-3 rounded-xl font-bold flex items-center gap-2 shadow-lg transition cursor-pointer text-xs md:text-sm"><Icon name="upload" className="w-4 h-4 md:w-5 md:h-5" /> Importar<input type="file" accept=".json" className="hidden" onChange={e=>importAllData(e.target.files[0])}/></label>
                                <button onClick={exportProgressPDF} className="bg-gray-700 hover:bg-gray-600 text-white px-4 md:px-5 py-2 md:py-3 rounded-xl font-bold flex items-center gap-2 shadow-lg transition text-xs md:text-sm"><Icon name="file-down" className="w-4 h-4 md:w-5 md:h-5" /> Imprimir</button>
                            </div>
                        </div>
                        {/* El resto del dashboard (actividad, mazos) se mantiene igual */}
                        <div className="bg-gray-800/80 p-4 md:p-6 rounded-2xl border border-gray-700 shadow-xl mb-6 md:mb-8">
                            <h2 className="text-lg md:text-xl font-bold text-white mb-3 md:mb-4 flex items-center gap-2"><Icon name="trending-up" className="w-5 h-5 md:w-6 md:h-6 text-green-400" /> Actividad Semanal</h2>
                            <div className="flex items-end justify-between gap-1 md:gap-2 h-[120px] md:h-[200px] mt-4 pt-4 border-t border-gray-700 relative">
                                {userStats.activityLog && userStats.activityLog.map((val, i) => (
                                    <div key={i} className="flex flex-col items-center flex-1 group h-full justify-end">
                                        <div className="w-full bg-blue-500 rounded-t-md transition-all duration-500 group-hover:bg-blue-400 relative shadow-[0_0_10px_rgba(59,130,246,0.5)]" style={{height: `${Math.max(val, 5)}%`}}>
                                            <span className="absolute -top-5 left-1/2 -translate-x-1/2 text-[10px] md:text-xs font-bold text-blue-200 opacity-0 group-hover:opacity-100 transition whitespace-nowrap">{val}XP</span>
                                        </div>
                                        <span className="text-[8px] md:text-[10px] text-gray-400 mt-1 md:mt-2 font-mono uppercase tracking-tighter whitespace-nowrap hidden md:block">{getLast7Days()[i]}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4 md:gap-6 mb-6 md:mb-8">
                            {/* Mazo difícil, normal, gramática (igual) */}
                            <div className="bg-gray-900 p-4 md:p-6 rounded-2xl border border-red-900/50 flex flex-col relative group">
                                <h2 className="text-base md:text-lg font-bold mb-3 md:mb-4 flex items-center gap-2 text-red-500"><Icon name="target" className="w-5 h-5 md:w-6 md:h-6" /> Vocab. Difícil</h2>
                                <ul className="space-y-1 md:space-y-2 flex-1 overflow-y-auto pr-2 mb-3 md:mb-4 max-h-32 md:max-h-40">
                                    {!userStats.difficultVocab || userStats.difficultVocab.length === 0 ? <p className="text-gray-500 text-xs md:text-sm">Vacío.</p> : userStats.difficultVocab.map((v,i)=><li key={i} className="bg-black/40 p-1 md:p-2 rounded border border-red-900/30 text-xs md:text-sm flex justify-between"><span className="text-red-400 font-bold">{v.de}</span><span className="text-gray-400 text-right w-1/2 truncate">{v.es}</span></li>)}
                                </ul>
                                <div className="flex gap-2"><button onClick={()=>startPractice('diff')} className="flex-1 bg-red-600 hover:bg-red-500 py-1.5 md:py-2 rounded-lg font-bold text-xs md:text-sm">Practicar</button><button onClick={()=>exportToAnki('vocab_diff')} className="bg-red-900 hover:bg-red-800 p-1.5 md:p-2 rounded-lg"><Icon name="download" className="w-3 h-3 md:w-4 md:h-4" /></button></div>
                            </div>
                            <div className="bg-gray-900 p-4 md:p-6 rounded-2xl border border-blue-900/50 flex flex-col"><h2 className="text-base md:text-lg font-bold mb-3 md:mb-4 flex items-center gap-2 text-blue-400"><Icon name="book-open" className="w-5 h-5 md:w-6 md:h-6" /> Vocab. Normal</h2><ul className="space-y-1 md:space-y-2 flex-1 overflow-y-auto pr-2 mb-3 md:mb-4 max-h-32 md:max-h-40">{!userStats.normalVocab?.length?<p className="text-gray-500 text-xs md:text-sm">Vacío.</p>:userStats.normalVocab.map((v,i)=><li key={i} className="bg-black/40 p-1 md:p-2 rounded border border-blue-900/30 text-xs md:text-sm flex justify-between"><span className="text-blue-300 font-bold">{v.de}</span><span className="text-gray-400 text-right w-1/2 truncate">{v.es}</span></li>)}</ul><div className="flex gap-2"><button onClick={()=>startPractice('norm')} className="flex-1 bg-blue-600 hover:bg-blue-500 py-1.5 md:py-2 rounded-lg font-bold text-xs md:text-sm">Practicar</button><button onClick={()=>exportToAnki('vocab_norm')} className="bg-blue-900 hover:bg-blue-800 p-1.5 md:p-2 rounded-lg"><Icon name="download" className="w-3 h-3 md:w-4 md:h-4" /></button></div></div>
                            <div className="bg-gray-900 p-4 md:p-6 rounded-2xl border border-cyan-900/50 flex flex-col"><h2 className="text-base md:text-lg font-bold mb-3 md:mb-4 flex items-center gap-2 text-cyan-400"><Icon name="brain" className="w-5 h-5 md:w-6 md:h-6" /> Gramática</h2><ul className="space-y-1 md:space-y-2 flex-1 overflow-y-auto pr-2 mb-3 md:mb-4 max-h-32 md:max-h-40">{!userStats.difficultGrammar?.length?<p className="text-gray-500 text-xs md:text-sm">Vacío.</p>:userStats.difficultGrammar.map((g,i)=><li key={i} className="bg-black/40 p-1 md:p-2 rounded border border-cyan-900/30 text-xs flex flex-col"><span className="text-cyan-400 font-bold">{g.base}</span><span className="text-gray-400 truncate text-[10px] md:text-xs">"{g.exampleDe}"</span></li>)}</ul><div className="flex gap-2"><button onClick={()=>startPractice('grammar')} className="flex-1 bg-cyan-600 hover:bg-cyan-500 py-1.5 md:py-2 rounded-lg font-bold text-xs md:text-sm">Practicar</button><button onClick={()=>exportToAnki('grammar')} className="bg-cyan-900 hover:bg-cyan-800 p-1.5 md:p-2 rounded-lg"><Icon name="download" className="w-3 h-3 md:w-4 md:h-4" /></button></div></div>
                        </div>
                    </div>
                )}
                {/* Biblioteca (con mezcla de lecciones y botón de práctica avanzada) */}
                {activeTab === 'guiones' && !practiceActive && ( /* tu código, pero añado un botón para abrir AdvancedPractice */ )}
                {/* Vocabulario (con botón de escritura a mano) */}
                {activeTab === 'vocabulario' && !practiceActive && (
                    <div className="flex-1 flex flex-col items-center justify-center p-4 md:p-8 animate-in fade-in">
                        <h1 className="absolute top-4 md:top-8 text-lg md:text-2xl font-black text-amber-900/40 uppercase tracking-widest hidden md:block">Active Recall - {activeScriptTitle}</h1>
                        {currentVocabList.length === 0 ? <div className="text-center text-amber-900/60 font-bold text-base md:text-2xl">Este guion no tiene vocabulario configurado.</div> : (
                            <div className="max-w-2xl w-full flex flex-col items-center gap-6 md:gap-10">
                                <button onClick={playVocabAudio} className="bg-white/20 hover:bg-white/30 text-amber-950 p-3 md:p-4 rounded-full transition shadow-lg mb-2 md:mb-4"><Icon name="volume-2" className="w-8 h-8 md:w-10 md:h-10" /></button>
                                <h1 className="text-4xl md:text-8xl font-black text-slate-900 text-center drop-shadow-md flex items-center justify-center flex-wrap gap-1">{getArticleVisual(currentVocabList[vocabReviewIndex].de)}{currentVocabList[vocabReviewIndex].de}</h1>
                                {!showVocabTranslation ? (
                                    <div className="flex gap-4 justify-center mt-6">
                                        <button onClick={()=>setShowVocabTranslation(true)} className="bg-slate-800 hover:bg-slate-700 text-white px-8 md:px-10 py-3 md:py-5 rounded-2xl font-bold text-2xl md:text-3xl shadow-lg transition">Revelar</button>
                                        <button onClick={()=>setShowHandwriting(true)} className="bg-amber-700 hover:bg-amber-600 text-white px-8 md:px-10 py-3 md:py-5 rounded-2xl font-bold text-2xl md:text-3xl shadow-lg transition flex items-center gap-2"><Icon name="pen-tool" /> Escribir</button>
                                    </div>
                                ) : (
                                    <div className="flex flex-col items-center gap-6 md:gap-8 w-full animate-in slide-in-from-bottom-8">
                                        <h2 className="text-2xl md:text-5xl font-bold text-slate-800 text-center bg-white/60 px-4 md:px-10 py-3 md:py-6 rounded-2xl md:rounded-3xl shadow-inner border border-white/40 w-full">{currentVocabList[vocabReviewIndex].es}</h2>
                                        <div className="flex flex-col md:flex-row gap-3 md:gap-4 w-full">
                                            <button onClick={()=>handleVocabDifficulty('easy')} className="flex-1 bg-green-600 hover:bg-green-500 text-white py-3 md:py-4 rounded-xl font-bold text-base md:text-lg shadow-lg transition">Fácil (Descartar)</button>
                                            <button onClick={()=>handleVocabDifficulty('normal')} className="flex-1 bg-blue-600 hover:bg-blue-500 text-white py-3 md:py-4 rounded-xl font-bold text-base md:text-lg shadow-lg transition">Normal</button>
                                            <button onClick={()=>handleVocabDifficulty('hard')} className="flex-1 bg-red-600 hover:bg-red-500 text-white py-3 md:py-4 rounded-xl font-bold text-base md:text-lg border-2 border-red-400 transition">Difícil</button>
                                        </div>
                                    </div>
                                )}
                                <p className="text-amber-900/60 font-bold mt-4 md:mt-8 bg-white/20 px-4 md:px-6 py-1.5 md:py-2 rounded-full border border-amber-900/20 text-xs md:text-sm">Palabra {vocabReviewIndex+1} de {currentVocabList.length}</p>
                            </div>
                        )}
                    </div>
                )}
                {/* Historia (todo igual, solo colores suaves) */}
                {activeTab === 'historia' && !practiceActive && ( /* tu código, con los paneles de tempus, etc. */ )}
            </div>

            {/* Controles de reproducción (igual) */}
            {activeTab === 'historia' && mode !== 'quiz' && mode !== 'interview' && !practiceActive && ( /* tu código */ )}

            {/* Modales */}
            {showLoginModal && ( /* tu código */ )}
            {showDeathModal && ( /* tu código */ )}
            {showTutor && ( /* tu código */ )}
            {showGrammarPrompt && ( /* tu código */ )}
            {showHandwriting && <HandwritingPad onClose={()=>setShowHandwriting(false)} onSave={(data)=>{ alert("Dibujo guardado (puedes comparar visualmente)"); }} />}
        </div>
    );
}

// ================== RENDER ==================
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
